    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { injectSignOutModal, populateSidebarUserInfo } from '../../scripts/shared/utils.js';

        lucide.createIcons();
        injectSignOutModal();
        populateSidebarUserInfo();

        let currentStep = 1;

        function goStep(n) {
            // Hide all steps
            for (let i = 1; i <= 4; i++) {
                document.getElementById('step' + i).classList.add('d-none');
            }
            // Show target
            document.getElementById('step' + n).classList.remove('d-none');
            currentStep = n;
            updateStepper();
            lucide.createIcons();
        }

        function updateStepper() {
            for (let i = 1; i <= 4; i++) {
                const circle = document.getElementById('sc' + i);
                const icon = document.getElementById('si' + i);
                const label = document.getElementById('sl' + i);
                if (i < currentStep) {
                    circle.className = 'step-circle done';
                    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                    label.className = 'step-label';
                } else if (i === currentStep) {
                    circle.className = 'step-circle active';
                    icon.textContent = i;
                    label.className = 'step-label';
                } else {
                    circle.className = 'step-circle pending';
                    icon.textContent = i;
                    label.className = 'step-label pending';
                }
            }
        }

        let ticketCount = 1;
        function addTicket() {
            ticketCount++;
            const row = document.createElement('div');
            row.className = 'ticket-row';
            row.dataset.ticket = ticketCount;
            row.innerHTML = `
                <input type="text" class="form-control" placeholder="e.g. VIP Pass">
                <input type="number" class="form-control" placeholder="0">
                <input type="number" class="form-control" placeholder="0">
                <button class="ticket-del-btn" onclick="removeTicket(this)" title="Remove">
                    <i data-lucide="trash-2" style="width:18px;height:18px;"></i>
                </button>`;
            document.getElementById('ticketRows').appendChild(row);
            lucide.createIcons();
        }

        function removeTicket(btn) {
            btn.closest('.ticket-row').remove();
        }
    </script>


    <!-- Scroll to Top Button -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;position:fixed;bottom:2rem;right:2rem;z-index:9999;
               width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
               background:#17b978;color:#fff;box-shadow:0 4px 16px rgba(23,185,120,0.35);
               align-items:center;justify-content:center;transition:opacity 0.2s ease;" title="Back to top">
        <i data-lucide="chevron-up" style="width:20px;height:20px;"></i>
    </button>
    <script>
        var scrollBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', function () {
            if (window.scrollY > 300) {
                scrollBtn.style.display = 'flex';
            } else {
                scrollBtn.style.display = 'none';
            }
        });
