<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Events - SyncEvent Organizer</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="icon" href="../../assets/favicon.svg" type="image/x-icon">
    <style>
        /* Dashboard UI Refinements */
        body.bg-neutral-50 {
            background-color: #f8fafc !important;
        }

        .card-custom {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02) !important;
            border-color: rgba(0, 0, 0, 0.06) !important;
        }
    </style>
</head>

<body class="bg-neutral-50">
    <!-- Organizer Navbar -->
    <header class="bg-white border-bottom sticky-top" style="height: 64px; z-index: 1000;">
        <div class="container-fluid px-4 h-100">
            <div class="d-flex align-items-center justify-content-between h-100">
                <!-- Left: Logo & Search -->
                <div class="d-flex align-items-center gap-4">
                    <a class="brand" href="dashboard.html" style="width: 140px;">
                        <img src="../../assets/logo.SVG" alt="SyncEvent" class="img-fluid">
                    </a>
                    <div class="position-relative d-none d-md-block" style="width: 300px;">
                        <i data-lucide="search"
                            class="position-absolute top-50 start-0 translate-middle-y ms-3 text-neutral-400"
                            width="18"></i>
                        <input type="text" class="form-control border-transparent ps-5"
                            placeholder="Search events, orders...">
                    </div>
                </div>

                <!-- Right: Actions & Profile -->
                <div class="d-flex align-items-center gap-3">
                    <a href="create-event.html"
                        class="btn btn-outline-primary rounded-pill d-none d-md-flex align-items-center gap-2">
                        <i data-lucide="plus" width="16"></i> Create Event
                    </a>

                    <a href="notifications.html"
                        class="icon-circle position-relative text-decoration-none bg-white ms-2">
                        <i data-lucide="bell" style="width:20px;height:20px;"></i>
                        <span class="position-absolute top-0 start-100 translate-middle p-1 rounded-circle"
                            style="width:10px;height:10px;margin-top:8px;margin-left:-8px;background:#17b978;"></span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="section-sm">
        <div class="container-fluid px-4">
            <div class="row g-4">
                <!-- Sidebar -->
                <div class="col-lg-3">
                    <div class="card-custom p-3">
                        <!-- User Info -->
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <span class="avatar-circle" id="sidebar-avatar"></span>
                            <div class="overflow-hidden">
                                <h6 class="mb-0 text-truncate" id="sidebar-name">Loading...</h6>
                                <small class="text-neutral-400 text-truncate d-block" id="sidebar-email">...</small>
                            </div>
                        </div>
                        <hr class="border-neutral-100 my-2">
                        <nav class="nav flex-column gap-1">
                            <a href="dashboard.html" class="sidebar-item">
                                <i data-lucide="layout-dashboard" class="sidebar-icon"></i> Dashboard
                            </a>
                            <a href="my-events.html" class="sidebar-item active">
                                <i data-lucide="calendar" class="sidebar-icon"></i> My Events
                            </a>
                            <a href="create-event.html" class="sidebar-item">
                                <i data-lucide="plus-circle" class="sidebar-icon"></i> Create Event
                            </a>
                            <a href="ticket-management.html" class="sidebar-item">
                                <i data-lucide="ticket" class="sidebar-icon"></i> Ticket Management
                            </a>
                            <a href="registrations.html" class="sidebar-item">
                                <i data-lucide="users" class="sidebar-icon"></i> Registrations
                            </a>
                            <a href="reports.html" class="sidebar-item">
                                <i data-lucide="bar-chart-2" class="sidebar-icon"></i> Reports
                            </a>
                            <a href="notifications.html" class="sidebar-item">
                                <i data-lucide="bell" class="sidebar-icon"></i> Notifications
                            </a>
                            <a href="profile.html" class="sidebar-item">
                                <i data-lucide="user" class="sidebar-icon"></i> Profile
                            </a>
                        </nav>
                        <hr class="border-neutral-100 my-3">
                        <div class="d-flex flex-column gap-2">
                            <button class="btn btn-outline-danger w-100 rounded-pill" id="logoutBtn">
                                <i data-lucide="log-out" width="18" class="me-2"></i> Logout
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">

                    <!-- Breadcrumb -->
                    <nav aria-label="breadcrumb" class="mb-3">
                        <ol class="breadcrumb mb-0" style="font-size:0.8125rem;">
                            <li class="breadcrumb-item"><a href="dashboard.html"
                                    class="text-decoration-none text-neutral-400">Dashboard</a></li>
                            <li class="breadcrumb-item active text-primary fw-medium" aria-current="page">My Events</li>
                        </ol>
                    </nav>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="d-flex align-items-center"><a href="dashboard.html"
                                class="icon-circle text-decoration-none me-3" title="Back to Dashboard"
                                style="flex-shrink:0;"><i data-lucide="arrow-left"
                                    style="width:18px;height:18px;"></i></a>
                            <h4 class="fw-bold mb-0">My Events</h4>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="h3 fw-bold text-neutral-900 mb-1">My Events</h2>
                            <p class="text-neutral-400 small mb-0">Manage and track all your events</p>
                        </div>
                        <a href="create-event.html" class="btn btn-primary rounded-pill">
                            <i data-lucide="plus" style="width:18px;height:18px;"></i> Create Event
                        </a>
                    </div>
                    <div class="row g-4 mb-4">
                        <div class="col-6 col-xl-3">
                            <div class="card-custom py-3 px-4 h-100">
                                <div class="h3 fw-medium text-neutral-900 mb-1">4</div>
                                <div class="text-neutral-400 small fw-medium">Total Events</div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-3">
                            <div class="card-custom py-3 px-4 h-100">
                                <div class="h3 fw-medium text-success mb-1">2</div>
                                <div class="text-neutral-400 small fw-medium">Published</div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-3">
                            <div class="card-custom py-3 px-4 h-100">
                                <div class="h3 fw-medium text-neutral-900 mb-1">1</div>
                                <div class="text-neutral-400 small fw-medium">Drafts</div>
                            </div>
                        </div>
                        <div class="col-6 col-xl-3">
                            <div class="card-custom py-3 px-4 h-100">
                                <div class="h3 fw-medium text-primary mb-1">$118,070</div>
                                <div class="text-neutral-400 small fw-medium">Total Revenue</div>
                            </div>
                        </div>
                    </div>
                    <div class="row g-4" id="events-grid">
                        <!-- Events will be populated by JS -->
                    </div>

                    <!-- Pagination -->
                    <div class="d-flex justify-content-center align-items-center gap-2 mt-5" id="pagination-controls">
                        <!-- Pagination controls will be populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>n>

    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../scripts/app.js" type="module"></script>


    <!-- Scroll to Top Button -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;position:fixed;bottom:2rem;right:2rem;z-index:9999;
               width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
               background:#17b978;color:#fff;box-shadow:0 4px 16px rgba(23,185,120,0.35);
               align-items:center;justify-content:center;transition:opacity 0.2s ease;" title="Back to top">
        <i data-lucide="chevron-up" style="width:20px;height:20px;"></i>
    </button>
    <script>
        var scrollBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', function () {
            if (window.scrollY > 300) {
                scrollBtn.style.display = 'flex';
            } else {
                scrollBtn.style.display = 'none';
            }
        });
    </script>

</body>

</html>
